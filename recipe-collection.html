<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レシピ帳</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --paper: #f3ede3;
    --warm: #e8ddd0;
    --ink: #2a1f14;
    --ink-light: #6b5744;
    --accent: #c0392b;
    --accent-soft: #e8a090;
    --green: #5a7a4a;
    --green-soft: #d4e6ca;
    --gold: #c9913a;
    --border: #d4c4b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

/* Header */
header {
background: var(–ink);
padding: 20px 24px 16px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 10;
isolation: auto;
}
.logo {
font-family: ‘Shippori Mincho’, serif;
font-size: 22px;
color: var(–cream);
letter-spacing: 0.08em;
display: flex;
align-items: center;
gap: 10px;
}
.logo-icon { font-size: 20px; }
.header-count {
font-size: 12px;
color: #a09080;
letter-spacing: 0.05em;
}

/* Main layout */
.container {
max-width: 900px;
margin: 0 auto;
padding: 0 16px 80px;
}

/* Add button FAB */
.fab {
position: fixed;
bottom: 28px;
right: 24px;
width: 60px;
height: 60px;
background: var(–accent);
color: white;
border: none;
border-radius: 50%;
font-size: 28px;
cursor: pointer;
box-shadow: 0 4px 20px rgba(192,57,43,0.4);
display: flex;
align-items: center;
justify-content: center;
transition: transform 0.2s, box-shadow 0.2s;
z-index: 200;
}
.fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(192,57,43,0.5); }

/* Filter bar */
.filter-bar {
display: flex;
gap: 8px;
padding: 16px 0 12px;
overflow-x: auto;
scrollbar-width: none;
flex-wrap: wrap;
position: relative;
z-index: 1;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
padding: 6px 14px;
border-radius: 20px;
border: 1.5px solid var(–border);
background: white;
color: var(–ink-light);
font-family: ‘Zen Maru Gothic’, sans-serif;
font-size: 13px;
cursor: pointer;
white-space: nowrap;
transition: all 0.15s;
}
.filter-chip.active {
background: var(–ink);
color: white;
border-color: var(–ink);
}
.filter-chip:hover:not(.active) { background: var(–warm); }

/* Search */
.search-wrap {
position: relative;
margin-bottom: 4px;
}
.search-input {
width: 100%;
padding: 12px 16px 12px 40px;
border: 1.5px solid var(–border);
border-radius: 12px;
background: white;
font-family: ‘Zen Maru Gothic’, sans-serif;
font-size: 14px;
color: var(–ink);
outline: none;
transition: border-color 0.2s;
}
.search-input:focus { border-color: var(–ink); }
.search-icon {
position: absolute;
left: 14px;
top: 50%;
transform: translateY(-50%);
color: var(–ink-light);
font-size: 16px;
}

/* Recipe grid */
.recipes-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
gap: 16px;
margin-top: 16px;
}

.recipe-card {
background: white;
border-radius: 16px;
overflow: hidden;
border: 1.5px solid var(–border);
cursor: pointer;
transition: transform 0.18s, box-shadow 0.18s;
position: relative;
}
.recipe-card:hover {
transform: translateY(-3px);
box-shadow: 0 8px 24px rgba(42,31,20,0.12);
}
.card-image {
width: 100%;
height: 160px;
object-fit: cover;
background: var(–warm);
display: flex;
align-items: center;
justify-content: center;
font-size: 48px;
color: var(–border);
}
.card-image img { width: 100%; height: 100%; object-fit: cover; }
.card-body { padding: 14px 14px 12px; }
.card-title {
font-family: ‘Shippori Mincho’, serif;
font-size: 16px;
font-weight: 600;
line-height: 1.4;
margin-bottom: 6px;
color: var(–ink);
}
.card-tags {
display: flex;
flex-wrap: wrap;
gap: 4px;
margin-bottom: 8px;
}
.tag {
padding: 2px 8px;
border-radius: 10px;
font-size: 11px;
font-weight: 500;
}
.tag-cat { background: var(–green-soft); color: var(–green); }
.tag-custom { background: #e8f0fe; color: #3a6ad4; }
.card-meta {
font-size: 12px;
color: var(–ink-light);
display: flex;
align-items: center;
gap: 6px;
}
.card-url {
font-size: 11px;
color: var(–ink-light);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
max-width: 180px;
display: inline-block;
}
.fav-btn {
position: absolute;
top: 8px;
right: 8px;
background: rgba(255,255,255,0.9);
border: none;
border-radius: 50%;
width: 32px;
height: 32px;
font-size: 16px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: transform 0.15s;
}
.fav-btn:hover { transform: scale(1.2); }

.empty-state {
text-align: center;
padding: 60px 20px;
color: var(–ink-light);
}
.empty-icon { font-size: 56px; margin-bottom: 16px; }
.empty-text { font-family: ‘Shippori Mincho’, serif; font-size: 18px; margin-bottom: 8px; }
.empty-sub { font-size: 13px; }

/* Modal */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(42,31,20,0.7);
z-index: 300;
display: none;
align-items: flex-end;
justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
background: var(–cream);
border-radius: 24px 24px 0 0;
width: 100%;
max-width: 600px;
max-height: 92vh;
overflow-y: auto;
padding: 0 0 40px;
animation: slideUp 0.3s ease;
position: relative;
z-index: 301;
}
@keyframes slideUp {
from { transform: translateY(100%); }
to { transform: translateY(0); }
}
.modal-handle {
width: 40px;
height: 4px;
background: var(–border);
border-radius: 2px;
margin: 14px auto 0;
}
.modal-header {
padding: 20px 24px 0;
display: flex;
align-items: center;
justify-content: space-between;
}
.modal-title {
font-family: ‘Shippori Mincho’, serif;
font-size: 20px;
font-weight: 600;
}
.modal-close {
width: 36px;
height: 36px;
border: none;
background: var(–warm);
border-radius: 50%;
font-size: 18px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
color: var(–ink);
}
.modal-body { padding: 20px 24px 0; }

.form-group { margin-bottom: 18px; }
.form-label {
display: block;
font-size: 13px;
font-weight: 700;
color: var(–ink-light);
margin-bottom: 6px;
letter-spacing: 0.04em;
}
.form-input, .form-textarea, .form-select {
width: 100%;
padding: 12px 14px;
border: 1.5px solid var(–border);
border-radius: 10px;
background: white;
font-family: ‘Zen Maru Gothic’, sans-serif;
font-size: 14px;
color: var(–ink);
outline: none;
transition: border-color 0.2s;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(–ink); }
.form-textarea { resize: vertical; min-height: 80px; }

/* Image upload */
.img-upload {
border: 2px dashed var(–border);
border-radius: 12px;
padding: 24px;
text-align: center;
cursor: pointer;
transition: border-color 0.2s, background 0.2s;
background: white;
position: relative;
}
.img-upload:hover { border-color: var(–accent); background: #fff8f7; }
.img-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.img-upload-icon { font-size: 32px; margin-bottom: 8px; }
.img-upload-text { font-size: 13px; color: var(–ink-light); }
.img-preview {
width: 100%;
height: 160px;
object-fit: cover;
border-radius: 10px;
margin-top: 10px;
display: none;
}

/* Ingredients */
.ingredient-list { display: flex; flex-direction: column; gap: 8px; }
.ingredient-row {
display: grid;
grid-template-columns: 1fr auto auto;
gap: 8px;
align-items: center;
}
.ingredient-row input {
padding: 9px 12px;
border: 1.5px solid var(–border);
border-radius: 8px;
font-family: ‘Zen Maru Gothic’, sans-serif;
font-size: 13px;
background: white;
color: var(–ink);
outline: none;
width: 100%;
}
.ingredient-row input:focus { border-color: var(–ink); }
.ingredient-row input.amount { width: 80px; }
.remove-ing {
width: 28px;
height: 28px;
border: none;
background: #fde;
border-radius: 6px;
color: var(–accent);
font-size: 16px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
}
.add-ing-btn {
margin-top: 8px;
padding: 8px 14px;
border: 1.5px dashed var(–border);
border-radius: 8px;
background: none;
font-family: ‘Zen Maru Gothic’, sans-serif;
font-size: 13px;
color: var(–ink-light);
cursor: pointer;
width: 100%;
transition: border-color 0.2s, color 0.2s;
}
.add-ing-btn:hover { border-color: var(–ink); color: var(–ink); }

/* Servings selector */
.servings-ctrl {
display: flex;
align-items: center;
gap: 12px;
}
.servings-btn {
width: 32px;
height: 32px;
border: 1.5px solid var(–border);
border-radius: 50%;
background: white;
font-size: 18px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: background 0.15s;
}
.servings-btn:hover { background: var(–warm); }
.servings-num {
font-family: ‘Shippori Mincho’, serif;
font-size: 22px;
font-weight: 600;
min-width: 24px;
text-align: center;
}
.servings-label { font-size: 13px; color: var(–ink-light); }

/* Tags input */
.tags-wrap {
display: flex;
flex-wrap: wrap;
gap: 6px;
padding: 10px 12px;
border: 1.5px solid var(–border);
border-radius: 10px;
background: white;
min-height: 44px;
cursor: text;
}
.tag-item {
display: flex;
align-items: center;
gap: 4px;
background: #e8f0fe;
color: #3a6ad4;
padding: 3px 8px 3px 10px;
border-radius: 12px;
font-size: 12px;
font-weight: 500;
}
.tag-remove {
border: none;
background: none;
cursor: pointer;
color: #3a6ad4;
font-size: 14px;
line-height: 1;
padding: 0;
}
.tags-input {
border: none;
outline: none;
font-family: ‘Zen Maru Gothic’, sans-serif;
font-size: 13px;
min-width: 80px;
flex: 1;
background: transparent;
color: var(–ink);
}

/* Submit */
.btn-submit {
width: 100%;
padding: 16px;
background: var(–accent);
color: white;
border: none;
border-radius: 14px;
font-family: ‘Shippori Mincho’, serif;
font-size: 17px;
font-weight: 600;
cursor: pointer;
margin-top: 8px;
transition: background 0.2s, transform 0.1s;
letter-spacing: 0.04em;
}
.btn-submit:hover { background: #a93226; }
.btn-submit:active { transform: scale(0.98); }

/* Detail modal */
.detail-image {
width: 100%;
height: 220px;
object-fit: cover;
background: var(–warm);
display: flex;
align-items: center;
justify-content: center;
font-size: 64px;
color: var(–border);
overflow: hidden;
border-radius: 16px 16px 0 0;
}
.detail-image img { width: 100%; height: 100%; object-fit: cover; }
.detail-body { padding: 20px 24px; }
.detail-title {
font-family: ‘Shippori Mincho’, serif;
font-size: 22px;
font-weight: 600;
margin-bottom: 10px;
line-height: 1.4;
}
.detail-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
.detail-url a {
color: var(–accent);
font-size: 13px;
word-break: break-all;
text-decoration: none;
}
.detail-url a:hover { text-decoration: underline; }
.section-title {
font-size: 13px;
font-weight: 700;
color: var(–ink-light);
letter-spacing: 0.06em;
margin: 20px 0 10px;
text-transform: uppercase;
}

/* Scaling */
.scaling-bar {
background: var(–paper);
border-radius: 14px;
padding: 14px 18px;
display: flex;
align-items: center;
gap: 16px;
margin-bottom: 16px;
border: 1.5px solid var(–warm);
}
.scaling-label { font-size: 13px; color: var(–ink-light); flex: 1; }
.scaling-result {
font-family: ‘Shippori Mincho’, serif;
font-size: 15px;
font-weight: 600;
color: var(–accent);
}

.ing-table { width: 100%; border-collapse: collapse; }
.ing-table td {
padding: 7px 4px;
font-size: 14px;
border-bottom: 1px solid var(–warm);
}
.ing-table td:first-child { color: var(–ink); flex: 1; }
.ing-table td:last-child {
text-align: right;
font-weight: 500;
color: var(–accent);
white-space: nowrap;
min-width: 80px;
}
.detail-memo {
background: var(–paper);
border-radius: 10px;
padding: 14px 16px;
font-size: 14px;
line-height: 1.7;
color: var(–ink);
white-space: pre-wrap;
border-left: 3px solid var(–gold);
}
/* Sub images */
.sub-imgs-upload {
display: flex;
gap: 8px;
flex-wrap: wrap;
margin-top: 8px;
}
.sub-img-thumb {
position: relative;
width: 80px;
height: 80px;
border-radius: 8px;
overflow: hidden;
border: 1.5px solid var(–border);
flex-shrink: 0;
}
.sub-img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.sub-img-remove {
position: absolute;
top: 2px;
right: 2px;
width: 20px;
height: 20px;
background: rgba(192,57,43,0.85);
color: white;
border: none;
border-radius: 50%;
font-size: 12px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
line-height: 1;
}
.sub-img-add {
width: 80px;
height: 80px;
border: 2px dashed var(–border);
border-radius: 8px;
background: white;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
cursor: pointer;
font-size: 22px;
color: var(–ink-light);
position: relative;
flex-shrink: 0;
transition: border-color 0.2s;
}
.sub-img-add:hover { border-color: var(–accent); }
.sub-img-add input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.sub-img-add-label { font-size: 10px; margin-top: 2px; }

/* Detail sub image gallery */
.sub-gallery {
display: flex;
gap: 10px;
overflow-x: auto;
padding-bottom: 4px;
scrollbar-width: none;
margin-top: 10px;
}
.sub-gallery::-webkit-scrollbar { display: none; }
.sub-gallery-img {
width: 120px;
height: 120px;
object-fit: cover;
border-radius: 10px;
flex-shrink: 0;
cursor: pointer;
border: 1.5px solid var(–border);
transition: transform 0.15s;
}
.sub-gallery-img:hover { transform: scale(1.03); }

/* Lightbox */
.lightbox {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.88);
z-index: 500;
display: none;
align-items: center;
justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
max-width: 95vw;
max-height: 88vh;
border-radius: 12px;
object-fit: contain;
}
.lightbox-close {
position: fixed;
top: 20px;
right: 20px;
width: 40px;
height: 40px;
background: rgba(255,255,255,0.15);
border: none;
border-radius: 50%;
color: white;
font-size: 22px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
}

.detail-actions {
display: flex;
gap: 10px;
margin-top: 24px;
}
.btn-edit {
flex: 1;
padding: 13px;
background: var(–ink);
color: white;
border: none;
border-radius: 12px;
font-family: ‘Zen Maru Gothic’, sans-serif;
font-size: 14px;
cursor: pointer;
transition: background 0.2s;
}
.btn-edit:hover { background: #3d2e22; }
.btn-delete {
padding: 13px 20px;
background: white;
color: var(–accent);
border: 1.5px solid var(–accent);
border-radius: 12px;
font-family: ‘Zen Maru Gothic’, sans-serif;
font-size: 14px;
cursor: pointer;
transition: background 0.2s;
}
.btn-delete:hover { background: #fff0ee; }

.section-header {
padding: 20px 0 6px;
display: flex;
align-items: center;
justify-content: space-between;
}
.section-count {
font-size: 13px;
color: var(–ink-light);
}
</style>

</head>

  <div class="form-group">

      <div class="sub-img-add">
        <input type="file" accept="image/*" multiple id="subImgFile">

      <button class="servings-btn" id="servInc">＋</button>

  <div class="form-group">

    <button class="add-ing-btn" id="addIngBtn">＋ 材料を追加</button>

  <div class="form-group">

<!-- Lightbox -->

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const STORAGE_KEY = 'recipe_collection_v1';
let recipes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentFilter = 'all';
let searchQuery = '';
let editingId = null;
let viewingRecipe = null;
let scaleServings = 4;
let formServings = 2;
let formTags = [];
let formIngredients = [];
let formSubImages = []; // array of dataURLs
let imgDataUrl = null;

// ---- Render ----
function render() {
  let list = recipes.slice();
  if (currentFilter === 'fav') list = list.filter(r => r.fav);
  else if (currentFilter !== 'all') list = list.filter(r => r.category === currentFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(r =>
      r.name.toLowerCase().includes(q) ||
      (r.tags || []).some(t => t.toLowerCase().includes(q)) ||
      (r.category || '').toLowerCase().includes(q)
    );
  }

  const grid = document.getElementById('recipesGrid');
  document.getElementById('headerCount').textContent = recipes.length + '品';
  document.getElementById('recipeCount').textContent = list.length + '品のレシピ';

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🥣</div>
      <div class="empty-text">${recipes.length === 0 ? 'まだレシピがありません' : '該当するレシピがありません'}</div>
      <div class="empty-sub">${recipes.length === 0 ? '右下の＋ボタンから追加してみよう！' : '検索やフィルタを変えてみてください'}</div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(r => `
    <div class="recipe-card" data-id="${r.id}">
      <div class="card-image">
        ${r.image ? `<img src="${r.image}" alt="${r.name}">` : '🍽️'}
      </div>
      <button class="fav-btn" data-fav="${r.id}">${r.fav ? '⭐' : '☆'}</button>
      <div class="card-body">
        <div class="card-title">${r.name}</div>
        <div class="card-tags">
          ${r.category ? `<span class="tag tag-cat">${r.category}</span>` : ''}
          ${(r.tags||[]).slice(0,3).map(t => `<span class="tag tag-custom">${t}</span>`).join('')}
        </div>
        <div class="card-meta">
          ${r.servings ? `<span>📋 ${r.servings}人前基準</span>` : ''}
          ${r.url ? `<span class="card-url">🔗 ${r.url.replace(/^https?:\/\//, '')}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.recipe-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.fav-btn')) return;
      openDetail(card.dataset.id);
    });
  });
  grid.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      toggleFav(btn.dataset.fav);
    });
  });
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
  render();
}

function toggleFav(id) {
  const r = recipes.find(x => x.id === id);
  if (r) { r.fav = !r.fav; save(); }
}

// ---- Filter ----
document.getElementById('filterBar').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentFilter = chip.dataset.cat;
  render();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ---- Add Modal ----
function openAddModal(recipe = null) {
  editingId = recipe ? recipe.id : null;
  document.getElementById('modalTitle').textContent = recipe ? 'レシピを編集' : 'レシピを追加';
  document.getElementById('fName').value = recipe ? recipe.name : '';
  document.getElementById('fCat').value = recipe ? (recipe.category || '') : '';
  document.getElementById('fUrl').value = recipe ? (recipe.url || '') : '';
  document.getElementById('fMemo').value = recipe ? (recipe.memo || '') : '';
  formServings = recipe ? (recipe.servings || 2) : 2;
  document.getElementById('servNum').textContent = formServings;
  imgDataUrl = recipe ? (recipe.image || null) : null;
  const prev = document.getElementById('imgPreview');
  if (imgDataUrl) { prev.src = imgDataUrl; prev.style.display = 'block'; }
  else { prev.style.display = 'none'; prev.src = ''; }

  formTags = recipe ? [...(recipe.tags || [])] : [];
  renderTags();

  formSubImages = recipe ? [...(recipe.subImages || [])] : [];
  renderSubImages();

  formIngredients = recipe ? (recipe.ingredients || []).map(i => ({...i})) : [];
  if (formIngredients.length === 0) formIngredients = [{ name: '', amount: '' }];
  renderIngredients();

  document.getElementById('addModal').classList.add('open');
}

document.getElementById('addBtn').addEventListener('click', () => openAddModal());
document.getElementById('closeAdd').addEventListener('click', () => {
  document.getElementById('addModal').classList.remove('open');
});
document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === document.getElementById('addModal')) document.getElementById('addModal').classList.remove('open');
});

// Servings
document.getElementById('servDec').addEventListener('click', () => {
  if (formServings > 1) { formServings--; document.getElementById('servNum').textContent = formServings; }
});
document.getElementById('servInc').addEventListener('click', () => {
  formServings++; document.getElementById('servNum').textContent = formServings;
});

// Image upload
document.getElementById('imgFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imgDataUrl = ev.target.result;
    const prev = document.getElementById('imgPreview');
    prev.src = imgDataUrl;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

// Sub images upload
document.getElementById('subImgFile').addEventListener('change', e => {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      formSubImages.push(ev.target.result);
      renderSubImages();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

function renderSubImages() {
  const wrap = document.getElementById('subImgsWrap');
  // keep the add button
  const addBtn = wrap.querySelector('.sub-img-add');
  wrap.innerHTML = '';
  formSubImages.forEach((src, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'sub-img-thumb';
    thumb.innerHTML = `<img src="${src}"><button class="sub-img-remove" data-i="${i}">×</button>`;
    thumb.querySelector('.sub-img-remove').addEventListener('click', () => {
      formSubImages.splice(i, 1);
      renderSubImages();
    });
    wrap.appendChild(thumb);
  });
  wrap.appendChild(addBtn);
}

// Tags
function renderTags() {
  const wrap = document.getElementById('tagsWrap');
  wrap.innerHTML = '';
  formTags.forEach((t, i) => {
    const el = document.createElement('span');
    el.className = 'tag-item';
    el.innerHTML = `${t}<button class="tag-remove" data-i="${i}">×</button>`;
    el.querySelector('.tag-remove').addEventListener('click', () => {
      formTags.splice(i, 1); renderTags();
    });
    wrap.appendChild(el);
  });
  const input = document.createElement('input');
  input.className = 'tags-input';
  input.id = 'tagInput';
  input.placeholder = formTags.length ? '' : '例：簡単、子ども好き';
  input.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ',') && input.value.trim()) {
      e.preventDefault();
      formTags.push(input.value.trim());
      renderTags();
    }
    if (e.key === 'Backspace' && !input.value && formTags.length) {
      formTags.pop(); renderTags();
    }
  });
  wrap.appendChild(input);
  wrap.addEventListener('click', () => input.focus());
  input.focus();
}

// Ingredients
function renderIngredients() {
  const list = document.getElementById('ingList');
  list.innerHTML = '';
  formIngredients.forEach((ing, i) => {
    const row = document.createElement('div');
    row.className = 'ingredient-row';
    row.innerHTML = `
      <input type="text" placeholder="材料名（例：鶏もも肉）" value="${ing.name}" data-field="name" data-i="${i}">
      <input type="text" class="amount" placeholder="量（例：200g）" value="${ing.amount}" data-field="amount" data-i="${i}">
      <button class="remove-ing" data-i="${i}">×</button>
    `;
    row.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', () => {
        formIngredients[inp.dataset.i][inp.dataset.field] = inp.value;
      });
    });
    row.querySelector('.remove-ing').addEventListener('click', () => {
      formIngredients.splice(i, 1);
      if (formIngredients.length === 0) formIngredients = [{ name: '', amount: '' }];
      renderIngredients();
    });
    list.appendChild(row);
  });
}

document.getElementById('addIngBtn').addEventListener('click', () => {
  formIngredients.push({ name: '', amount: '' });
  renderIngredients();
  document.getElementById('ingList').lastElementChild?.querySelector('input')?.focus();
});

// Save
document.getElementById('saveBtn').addEventListener('click', () => {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('料理名を入力してください'); return; }

  const recipe = {
    id: editingId || Date.now().toString(),
    name,
    category: document.getElementById('fCat').value,
    url: document.getElementById('fUrl').value.trim(),
    memo: document.getElementById('fMemo').value.trim(),
    servings: formServings,
    ingredients: formIngredients.filter(i => i.name.trim()),
    tags: formTags,
    image: imgDataUrl,
    subImages: formSubImages,
    fav: false,
    createdAt: editingId ? undefined : Date.now(),
  };

  if (editingId) {
    const idx = recipes.findIndex(r => r.id === editingId);
    if (idx !== -1) {
      recipe.fav = recipes[idx].fav;
      recipe.createdAt = recipes[idx].createdAt;
      recipes[idx] = recipe;
    }
  } else {
    recipes.unshift(recipe);
  }

  save();
  document.getElementById('addModal').classList.remove('open');
});

// ---- Detail Modal ----
function openDetail(id) {
  viewingRecipe = recipes.find(r => r.id === id);
  if (!viewingRecipe) return;
  scaleServings = 4;
  renderDetail();
  document.getElementById('detailModal').classList.add('open');
}

function renderDetail() {
  const r = viewingRecipe;
  document.getElementById('scaleNum').textContent = scaleServings;

  // image
  const imgWrap = document.getElementById('detailImageWrap');
  if (r.image) {
    imgWrap.innerHTML = `<img src="${r.image}" alt="${r.name}">`;
  } else {
    imgWrap.innerHTML = '🍽️';
  }

  // sub gallery
  const gallery = document.getElementById('detailSubGallery');
  const allSubImgs = r.subImages || [];
  if (allSubImgs.length === 0) {
    gallery.innerHTML = '<span style="font-size:13px;color:var(--ink-light)">サブ写真なし</span>';
  } else {
    gallery.innerHTML = allSubImgs.map(src =>
      `<img class="sub-gallery-img" src="${src}" alt="">`
    ).join('');
    gallery.querySelectorAll('.sub-gallery-img').forEach(img => {
      img.addEventListener('click', () => openLightbox(img.src));
    });
  }

  document.getElementById('detailTitle').textContent = r.name;

  // tags
  let tagsHtml = '';
  if (r.category) tagsHtml += `<span class="tag tag-cat">${r.category}</span>`;
  (r.tags || []).forEach(t => { tagsHtml += `<span class="tag tag-custom">${t}</span>`; });
  document.getElementById('detailTags').innerHTML = tagsHtml;

  // url
  const urlEl = document.getElementById('detailUrl');
  urlEl.innerHTML = r.url ? `<a href="${r.url}" target="_blank">🔗 元のレシピを見る</a>` : '';

  // ingredients with scaling
  const baseServings = r.servings || 2;
  const ratio = scaleServings / baseServings;
  let tableHtml = '';
  (r.ingredients || []).forEach(ing => {
    const scaledAmount = scaleAmount(ing.amount, ratio);
    tableHtml += `<tr><td>${ing.name}</td><td>${scaledAmount}</td></tr>`;
  });
  if (!tableHtml) tableHtml = `<tr><td colspan="2" style="color:var(--ink-light);font-size:13px;">材料が登録されていません</td></tr>`;
  document.getElementById('ingTable').innerHTML = tableHtml;

  // memo
  const memoEl = document.getElementById('detailMemo');
  memoEl.textContent = r.memo || 'メモなし';
  if (!r.memo) memoEl.style.color = 'var(--ink-light)';
  else memoEl.style.color = 'var(--ink)';
}

function scaleAmount(amountStr, ratio) {
  if (!amountStr) return '';
  // Try to find number(s) and scale them
  return amountStr.replace(/[\d.]+/g, match => {
    const num = parseFloat(match);
    if (isNaN(num)) return match;
    const scaled = num * ratio;
    // Format nicely
    if (scaled === Math.floor(scaled)) return scaled.toString();
    return Math.round(scaled * 10) / 10 + '';
  });
}

// Scale controls
document.getElementById('scaleDec').addEventListener('click', () => {
  if (scaleServings > 1) { scaleServings--; renderDetail(); }
});
document.getElementById('scaleInc').addEventListener('click', () => {
  scaleServings++; renderDetail();
});

document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === document.getElementById('detailModal')) document.getElementById('detailModal').classList.remove('open');
});

document.getElementById('editBtn').addEventListener('click', () => {
  document.getElementById('detailModal').classList.remove('open');
  openAddModal(viewingRecipe);
});

document.getElementById('deleteBtn').addEventListener('click', () => {
  if (!confirm(`「${viewingRecipe.name}」を削除しますか？`)) return;
  recipes = recipes.filter(r => r.id !== viewingRecipe.id);
  save();
  document.getElementById('detailModal').classList.remove('open');
});

// Lightbox
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightboxClose').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open');
});

// Init
renderTags();
renderIngredients();
renderSubImages();
render();
</script>
